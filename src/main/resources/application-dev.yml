server:
  port: 8082
  error:
    include-message: always

spring:
  application:
    name: ms-vendedores

  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}


  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format-sql: true

  flyway:
    enbled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

# La dirección del Directorio Telefónico (Eureka Server)
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
      
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
